[OptionExplanations]
OptionExplanations=設定項目の説明です。
HV_BGAnimIntensity=背景アニメーションの強度を調整します。OFFで無効になります。
HV_AccentColor=テーマのUI要素に使用するアクセントカラーを選択します。
HV_BackgroundEffect=メインメニュー背景のビジュアルスタイルを選択します。
HV_ShowMSD=StepManiaクラシック表示と現代的なEtterna MSDを切り替えます。
HV_ShowJudgeOffsets=リザルト画面での判定オフセット散布図を切り替えます。
HV_ShowProfileStats=自己統計の表示を切り替えます。
HV_MSDColorScaleV3=MSDカラースキームを選択します。
HV_ShowMeasureLines=プレイ中の小節分割線の表示を切り替えます。
HV_ScreenFilter=背景/プレイフィールドを暗くしてノーツの視認性を向上させます。
HV_LaneCover=レーンカバーの高さ（Sudden/Hiddenスタイル）を調整します。
HV_ShowNPS=プレイ中のリアルタイムNPS（Notes Per Second）カウンターを切り替えます。
HV_Particles=背景やメニューのパーティクル装飾を切り替えます。
HV_EnableGlow=アクティブな要素への微細なグロー効果を切り替えます。
HV_UseCustomGrades=カスタム漢字グレード名の使用を切り替えます。
HV_GradeColorStyle=ホログラフィックとクラシックのグレード色設定を切り替えます。
Mini=レセプターとノーツのズームレベルを調整します。100%が標準サイズです。

