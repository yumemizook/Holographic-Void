[OptionExplanations]
HV_AccentColor=Choose the accent color used for highlights, borders and interactive elements.
HV_UIOpacity=Adjust the overall opacity of UI panels and overlays.
HV_EnableGlow=Toggle subtle glow effects on active and focused elements.
HV_BGAnimIntensity=Controls how intense background animations are. Off disables them entirely.
HV_WheelOffsetX=Horizontal offset for the music wheel position.
HV_WheelOffsetY=Vertical offset for the music wheel position.
HV_EvalGraphScale=Scale the height of the evaluation offset graph.
HV_ShowMSD=Toggle display of MSD skillset ratings on the song select and evaluation screens.
HV_ShowJudgeOffsets=Toggle the judge offset scatter plot on the evaluation screen.
HV_ShowProfileStats=Toggle display of player profile statistics on the song select screen.
HV_DefaultJudge=Set the default judge difficulty for new plays.
HV_MSDColorScale=Choose between Holographic Void and classic color schemes for MSD ratings.
HV_ShowMeasureLines=Toggle display of horizontal measure divider lines in gameplay.

