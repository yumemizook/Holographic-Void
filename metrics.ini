[OptionsCursor]
LeftOnCommand=%function(self) self:diffuse(getMainColor('highlight')) end
MiddleOnCommand=%function(self) self:diffuse(getMainColor('highlight')) end
RightOnCommand=%function(self) self:diffuse(getMainColor('highlight')) end
CanGoLeftOnCommand=%function(self) self:diffuse(getMainColor('highlight')) end
CanGoRightOnCommand=%function(self) self:diffuse(getMainColor('highlight')) end

[OptionsUnderline]
LeftOnCommand=%function(self) self:diffuse(getMainColor('highlight')) end
MiddleOnCommand=%function(self) self:diffuse(getMainColor('highlight')) end
RightOnCommand=%function(self) self:diffuse(getMainColor('highlight')) end

[OptionsCursorP1]
