[OptionExplanations]
OptionExplanations=Description of the options.
HV_BGAnimIntensity=Controls how intense background animations are. Off disables them entirely.
HV_AccentColor=Choose a primary accent color for the theme's UI elements.
HV_BackgroundEffect=Choose a visual style for the main menu background.
HV_ShowMSD=Change between the StepMania classic display mode and the modern Etterna MSD.
HV_ErrorBarMode=Choose the display mode for the timing error bar: Standard (scatter plot), EWMA (moving average), or Both.
HV_ShowProfileStats=Toggle display of your profile statistics on the song selection screen.
HV_MSDColorScaleV3=Choose between Holographic Void, Classic (Til Death), None (White), or Monochrome MSD color schemes.
HV_ShowMeasureLines=Toggle display of horizontal measure divider lines in gameplay.
HV_ScreenFilter=Dim the background/playfield to improve visibility of notes.
HV_LaneCover=Adjust the height of the lane cover (Sudden/Hidden style).
HV_ShowNPS=Toggle real-time display of Notes Per Second (NPS) counter in gameplay.
HV_Particles=Toggle background and menu decoration particles.
HV_EnableGlow=Toggle subtle glow effects on active and focused elements.
HV_UseCustomGrades=Toggle usage of custom Kanji grade names.
HV_GradeColorStyle=Toggle between Holographic and Classic grade text coloring.
HV_NPSWindowSize=Set the time window (in seconds) used for the real-time NPS calculation.
HV_ShowPacemakerGraph=Show the full-size pacemaker graph at the top of the screen.
HV_ShowTextPacemaker=Show the mini text-based local/target time difference display.
HV_PacemakerTargetType=Select the type of target to compare against (Target %, PB, etc).
HV_PacemakerTargetGoal=Set the target percentage to use for the pacemaker comparison.
HV_PacemakerType=Quickly toggle between different pacemaker targets.
HV_PacemakerGoal=Adjust the target percentage for the current session.
HV_ShowMean=Toggle display of the average timing offset (Mean) on the notefield during gameplay.
HV_QuotesMode=Choose what text to scroll on the title screen: Quotes, Tips, or hide it entirely.
Mini=Adjust the zoom level of the receptors and notes. 100% is normal size.

