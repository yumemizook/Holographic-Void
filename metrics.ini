[OptionsCursorP2]
Fallback="OptionsCursor"

[OptionsUnderlineP1]
Fallback="OptionsUnderline"

[OptionsUnderlineP2]
Fallback="OptionsUnderline"

[ScreenCoreBundleSelect]
Class="ScreenSplash"
Fallback="ScreenSplash"
NextScreen="ScreenTitleMenu"
PrevScreen="ScreenTitleMenu"
ShowStyleIcon=false
TimerSeconds=-1
ShowHelp=false
AllowStartToSkip=false

[ScreenHVAlarmOverlay]
Class="ScreenWithMenuElementsBasic"
Fallback="Screen"
PlayMusic=false
