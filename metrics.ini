[Global]
# Inherit from _fallback to ensure all engine behaviors are handled.
FallbackTheme=_fallback

[Common]
InitialScreen="ScreenInit"
AutoSetStyle=true
DefaultModifiers="C400"
DefaultNoteSkinName="DivideByZero"

[Common]
# How big the design of the theme is. for example, if a theme was designed for
# 1080p, it would be shrunken for 640x480, as well as that, if it was designed
# for 480p, it would be enlarged for bigger screens!
ScreenWidth=1
ScreenHeight=480

[SongManager]
NumSongGroupColors=1
SongGroupColor1=color("#FFFFFF")

[GraphDisplay]
BodyWidth=WideScale(get43size(280),280)
BodyHeight=80

[ComboGraph]
BodyWidth=WideScale(get43size(280),280)
BodyHeight=100

[ComboGraphP1]
Fallback="ComboGraph"

# ScreenInit inherits from _Fallback's [ScreenInit] which chains:
#   ScreenInit -> ScreenSplash -> ScreenWithMenuElements -> Screen
# We do NOT set Fallback here to avoid infinite recursion.
[ScreenInit]
NextScreen=Branch.AfterInit()

[ScreenTitleMenu]
#
ChoiceNames="Start,ColorTheme,PackDownloader,Options,Exit"
ChoiceStart="applydefaultoptions;text,START;screen,"..Branch.AfterTitleMenu()
ChoiceColorTheme="screen,ScreenColorTheme;text,COLOR THEME"
ChoicePackDownloader="screen,ScreenPackDownloader;text,PACK DOWNLOADER"
ChoiceOptions="screen,ScreenOptionsService;text,OPTIONS"
ChoiceExit="screen,ScreenExit;text,EXIT"
#
DefaultChoice="Start"
ShowScroller=true
#
ScrollerX=SCREEN_CENTER_X
ScrollerY=SCREEN_CENTER_Y+20
ScrollerTransform=function(self,offset,itemIndex,numItems) self:y(44*(itemIndex-(numItems-1)/2)); end
ScrollerNumItemsToDraw=10
ScrollerSecondsPerItem=0
#
WrapCursor=true
SharedSelection=true
AllowRepeatingInput=true

[ScreenColorTheme]
Fallback="ScreenWithMenuElements"
Class="ScreenWithMenuElementsBasic"
NextScreen=Branch.TitleMenu()
PrevScreen=Branch.TitleMenu()
PlayMusic=false
TimerSeconds=-1

[ScreenAssetSettings]
Fallback="ScreenWithMenuElements"
Class="ScreenWithMenuElementsBasic"
NextScreen="ScreenSelectMusic"
PrevScreen="ScreenSelectMusic"

#
ScrollerX=SCREEN_CENTER_X
ScrollerY=SCREEN_CENTER_Y+40
ScrollerTransform=function(self,offset,itemIndex,numItems) self:y(40*(itemIndex-(numItems-1)/2)); end
ScrollerSecondsPerItem=0
ScrollerNumItemsToDraw=20

# ScreenPackDownloader: Use ScreenSplash (like Til' Death)
# Custom BGAnimations in BGAnimations/ScreenPackDownloader decorations/
[ScreenPackDownloader]
Class="ScreenSplash"
Fallback="ScreenSplash"
NextScreen="ScreenSelectMusic"
PrevScreen=Branch.TitleMenu()
ShowStyleIcon=false
TimerSeconds=-1
ShowHelp=false
AllowStartToSkip=false

# ScreenOptionsService: Add Theme Options line
[ScreenOptionsService]
LineNames="GameType,GraphicSound,KeyConfig,Theme,InputOptions,SoundGraphics,Profiles,Network,Advanced"
LineTheme="gamecommand;screen,ScreenOptionsTheme;name,Theme Options"

# ScreenOptionsTheme: Our 11 ThemePrefsRow options
# TODO: actually make these appear in the Theme Options screen
[ScreenOptionsTheme]
Fallback="ScreenOptionsServiceChild"
NextScreen="ScreenOptionsService"
PrevScreen="ScreenOptionsService"
LineNames="HV_BGAnimIntensity,HV_BackgroundEffect,HV_ShowMSD,HV_ShowProfileStats,HV_MSDColorScaleV3,HV_ShowMeasureLines,HV_ShowNPS,HV_NPSWindowSize,HV_ShowPacemakerGraph,HV_ShowTextPacemaker,HV_PacemakerTargetType,HV_PacemakerTargetGoal,HV_ShowMean,HV_QuotesMode,HV_ErrorBarMode,HV_Particles,HV_EnableGlow,HV_UseCustomGrades,HV_GradeColorStyle"
LineHV_EnableGlow="lua,ThemePrefRow('HV_EnableGlow')"
LineHV_BGAnimIntensity="lua,ThemePrefRow('HV_BGAnimIntensity')"
LineHV_BackgroundEffect="lua,ThemePrefRow('HV_BackgroundEffect')"
LineHV_ShowMSD="lua,ThemePrefRow('HV_ShowMSD')"
LineHV_ShowProfileStats="lua,ThemePrefRow('HV_ShowProfileStats')"
LineHV_MSDColorScaleV3="lua,ThemePrefRow('HV_MSDColorScaleV3')"
LineHV_ShowMeasureLines="lua,ThemePrefRow('HV_ShowMeasureLines')"
LineHV_ShowNPS="lua,ThemePrefRow('HV_ShowNPS')"
LineHV_NPSWindowSize="lua,ThemePrefRow('HV_NPSWindowSize')"
LineHV_ShowPacemakerGraph="lua,ThemePrefRow('HV_ShowPacemakerGraph')"
LineHV_ShowTextPacemaker="lua,ThemePrefRow('HV_ShowTextPacemaker')"
LineHV_PacemakerTargetType="lua,ThemePrefRow('HV_PacemakerTargetType')"
LineHV_PacemakerTargetGoal="lua,ThemePrefRow('HV_PacemakerTargetGoal')"
LineHV_Particles="lua,ThemePrefRow('HV_Particles')"
LineHV_UseCustomGrades="lua,ThemePrefRow('HV_UseCustomGrades')"
LineHV_GradeColorStyle="lua,ThemePrefRow('HV_GradeColorStyle')"
LineHV_ShowMean="lua,ThemePrefRow('HV_ShowMean')"
LineHV_QuotesMode="lua,ThemePrefRow('HV_QuotesMode')"
LineHV_ErrorBarMode="lua,OptionRowErrorBarMode()"

[ScreenSelectMusic]
MusicWheelX=SCREEN_WIDTH-180
MusicWheelY=SCREEN_CENTER_Y
AllowRepeatingInput=true
MusicWheelType="MusicWheel"

CodeNames="NextRate,PrevRate"
CodeNextRate="EffectUp"
CodePrevRate="EffectDown"

[MusicWheel]
# Override wheel appearance for monochromatic theme
NumWheelItems=15
ItemTransformFunction=function(self,offsetFromCenter,itemIndex,numItems) self:x(0); self:y(offsetFromCenter*40); self:diffusealpha(math.max(0,1-math.abs(offsetFromCenter)/6.5)); end
SwitchSeconds=0.1
SampleMusicDelayInit=0.3
SampleMusicDelay=0.3
ScrollBarOnCommand=visible,false
SectionColor1=color("#FFFFFF")
SortMenuColor=color("#FFFFFF")
EmptyColor=color("#585858")
WheelItemLockedColor=color("0,0,0,0.7")

[MusicWheelItem]
SongNameOnCommand=halign,0.5;zoom,0.55;shadowlength,0;x,0
SectionExpandedOnCommand=halign,0;zoom,0.6;shadowlength,0;x,-128;maxwidth,180/0.6
SectionCollapsedOnCommand=halign,0;zoom,0.6;shadowlength,0;x,-128;maxwidth,180/0.6
SortOnCommand=halign,0.5;zoom,0.6;shadowlength,0
RouletteOnCommand=halign,0.5;zoom,0.6;shadowlength,0
RandomOnCommand=halign,0.5;zoom,0.6;shadowlength,0
SectionCountX=130
SectionCountY=-10
SectionCountOnCommand=halign,1;zoom,0.4;diffuse,0.5,0.5,0.5,1

# Override OverlayScreens to add our custom download overlay
[Common]
OverlayScreens="ScreenSystemLayer,ScreenSyncOverlay,ScreenStatsOverlay,ScreenDebugOverlay,ScreenInstallOverlay,ScreenChatOverlay,ScreenHVDownloadOverlay,ScreenHVAlarmOverlay"

# Hide the default ScreenInstallOverlay "Downloading file xxx.zip" text
# (we replace it with our own ScreenHVDownloadOverlay)
[ScreenInstallOverlay]
StatusX=-9999
StatusY=-9999
StatusOnCommand=visible,false

# Our custom global download progress overlay
[ScreenHVDownloadOverlay]
Class="ScreenWithMenuElementsBasic"
Fallback="Screen"
PlayMusic=false
MusicAlignBeat=false
DelayMusicSeconds=0
CancelTransitionsOut=false
TimerSeconds=-1
TimerMetricsGroup=

[ScreenTextEntry]
QuestionX=SCREEN_CENTER_X
QuestionY=SCREEN_CENTER_Y-30
AnswerX=SCREEN_CENTER_X
AnswerY=SCREEN_CENTER_Y+20
QuestionOnCommand=zoom,0.6;diffuse,color("1,1,1,1");shadowlength,1
AnswerOnCommand=zoom,0.6;diffuse,color("1,1,1,1");shadowlength,1

# 0.74.4 Compatibility Note:
# We avoid using GameCommands url/urlnoexit.
# Use DLMAN methods for external links.

[ScreenGameplay]
LifeP1X=-9999
LifeP1Y=-9999
LifeP2X=-9999
LifeP2Y=-9999

[Player]
# Standard Etterna Player Metrics
ReceptorArrowsYStandard=-164
ReceptorArrowsYReverse=164
ReceptorArrowsVisible=true
ComboOnCommand=visible,false
JudgmentOnCommand=visible,false

[Judgment]
# Disable engine judgment display (we use Lua HUD)
JudgmentOnCommand=visible,false

[Combo]
# Show combo starting at 1 hit (matching Til Death standard)
ShowComboAt=1
ShowMissesAt=MissCombo()
# Disable engine combo display (we use Lua HUD)
ComboOnCommand=visible,false

[NoteField]
# Standard NoteField metrics

[ScreenChartPreview]
Fallback="ScreenWithMenuElements"
PrevScreen="ScreenSelectMusic"
NextScreen="ScreenSelectMusic"

[ScreenPlayerOptions]
Fallback="ScreenOptionsMaster"
# Consolidated options into one screen
LineNames="Speed,RateList,HV_Mini,NoteSk,ScrollDir,PRAC,Judge,Life,Fail,Score,Assist,Persp,Background,Center,HV_ScreenFilter,HV_LaneCover,HV_ShowTextPacemaker,HV_PacemakerType,HV_PacemakerGoal,Accel,EffectsReceptor,EffectsArrow,Appearance,Turn,Insert,R1,R2,Scroll,Holds,Mines"

LineSpeed="lua,ArbitrarySpeedMods()"
LinePRAC="lua,PracticeMode()"
LineRateList="lua,RateList()"
LineNoteSk="list,NoteSkins"
LineScrollDir="list,ScrollDir"
LineCenter="conf,Center1Player"
LineBackground="conf,BGBrightness"
LineJudge="lua,JudgeDifficulty()"
LineLife="conf,LifeDifficulty"
LineFail="list,Fail"
LineScore="list,SaveScores"
LineAssist="list,Assist"
LinePersp="list,Persp"

LineAccel="list,Accel"
LineEffectsReceptor="list,EffectsReceptor"
LineEffectsArrow="list,EffectsArrow"
LineAppearance="list,Appearance"
LineTurn="list,Turn"
LineInsert="list,Insert"
LineR1="list,RemoveCombinations"
LineR2="list,RemoveFeatures"
LineScroll="list,Scroll"
LineHolds="list,Holds"
LineMines="list,Mines"

LineHV_Mini="lua,OptionRowMini()"
LineHV_ScreenFilter="lua,OptionRowScreenFilter()"
LineHV_LaneCover="lua,OptionRowLaneCover()"
LineHV_PacemakerType="lua,OptionRowPacemakerType()"
LineHV_PacemakerGoal="lua,OptionRowPacemakerGoal()"
LineHV_ShowTextPacemaker="lua,OptionRowShowTextPacemaker()"
LineHV_ErrorBarMode="lua,OptionRowErrorBarMode()"

[ScreenSongOptions]
Fallback="ScreenOptions"
Class="ScreenSongOptions"
PrevScreen="ScreenPlayerOptions"
NextScreen="ScreenStageInformation"
TimerSeconds=-1

[PlayerStageStats]
GradePercent_Tier01=0.999935
GradePercent_Tier02=0.99980
GradePercent_Tier03=0.99970
GradePercent_Tier04=0.99955
GradePercent_Tier05=0.9990
GradePercent_Tier06=0.9980
